<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – PLC SimTel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="./auth-config.js"></script>
    <script src="./auth-guard.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #0a0e1a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-strong: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --blob-violet: #6c5ce7;
            --blob-cyan: #22d3ee;
            --blob-amber: #f59e0b;
            --text-hi: #f1f5f9;
            --text-mid: #a8b3c7;
            --text-dim: #64748b;
            --success: #34d399;
            --danger: #fb7185;
            --admin-accent: #818cf8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-hi);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .blob-field { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.35; will-change: transform; }
        .blob-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle at 30% 30%, var(--blob-violet), transparent 70%);
            top: -160px; left: -120px;
            animation: drift1 22s ease-in-out infinite;
        }
        .blob-2 {
            width: 460px; height: 460px;
            background: radial-gradient(circle at 60% 40%, var(--blob-cyan), transparent 70%);
            bottom: -180px; right: -100px;
            animation: drift2 26s ease-in-out infinite;
        }
        @keyframes drift1 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(50px, 30px) scale(1.1); } }
        @keyframes drift2 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-40px, -30px) scale(1.08); } }

        .admin-header {
            position: relative;
            z-index: 2;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .admin-header h1 {
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-hi);
        }

        .admin-header h1 i { color: var(--admin-accent); }

        .admin-header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .admin-header a {
            color: var(--text-mid);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.15s ease;
        }

        .admin-header a:hover { color: var(--text-hi); }

        .admin-header button {
            background: rgba(251, 113, 133, 0.12);
            color: #ffb4c0;
            border: 1px solid rgba(251, 113, 133, 0.3);
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .admin-header button:hover { background: rgba(251, 113, 133, 0.22); transform: translateY(-1px); }

        .admin-body {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 20px;
        }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 18px 22px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            flex: 1;
            min-width: 130px;
            text-align: center;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .stat-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }

        .stat-card .stat-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--blob-cyan), var(--blob-violet));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-mid);
            margin-top: 2px;
        }

        /* Panels */
        .panel {
            background: var(--glass);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            margin-bottom: 24px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
        }

        .panel-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .panel-header h2 {
            font-family: 'Sora', sans-serif;
            font-size: 0.98rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-hi);
        }

        .panel-header h2 i { color: var(--admin-accent); }

        .panel-body { padding: 20px; }

        .create-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .create-form input, .create-form select {
            flex: 1;
            min-width: 140px;
            padding: 9px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 7px;
            font-size: 0.9rem;
            font-family: inherit;
            color: var(--text-hi);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .create-form select option { background: #10162b; color: var(--text-hi); }

        .create-form input::placeholder { color: var(--text-dim); }

        .create-form input:focus, .create-form select:focus {
            outline: none;
            border-color: var(--blob-cyan);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--blob-violet), #4f46e5);
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 9px 18px;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(108, 92, 231, 0.5); filter: brightness(1.08); }

        /* Search */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-bar input {
            padding: 7px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 7px;
            font-size: 0.88rem;
            font-family: inherit;
            width: 200px;
            color: var(--text-hi);
        }

        .search-bar input::placeholder { color: var(--text-dim); }

        .search-bar input:focus {
            outline: none;
            border-color: var(--blob-cyan);
        }

        /* Table */
        .user-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        .user-table th {
            background: rgba(255,255,255,0.03);
            padding: 11px 14px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--glass-border);
            font-family: 'JetBrains Mono', monospace;
        }

        .user-table td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            vertical-align: middle;
            color: var(--text-mid);
        }

        .user-table td strong { color: var(--text-hi); }

        .user-table tr:last-child td { border-bottom: none; }

        .user-table tr:hover td { background: rgba(255,255,255,0.03); }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-active { background: rgba(52, 211, 153, 0.14); color: #6ee7b7; border: 1px solid rgba(52, 211, 153, 0.3); }
        .badge-inactive { background: rgba(251, 113, 133, 0.14); color: #fda4af; border: 1px solid rgba(251, 113, 133, 0.3); }
        .badge-admin { background: rgba(129, 140, 248, 0.16); color: #a5b4fc; border: 1px solid rgba(129, 140, 248, 0.35); }
        .badge-user { background: rgba(255,255,255,0.06); color: var(--text-mid); border: 1px solid var(--glass-border); }

        .action-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 5px 11px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-family: inherit;
            cursor: pointer;
            border: 1px solid transparent;
            font-weight: 600;
            transition: all 0.15s ease;
        }

        .btn-activate { background: rgba(52, 211, 153, 0.12); color: #6ee7b7; border-color: rgba(52, 211, 153, 0.3); }
        .btn-activate:hover { background: var(--success); color: #04140d; }
        .btn-deactivate { background: rgba(251, 113, 133, 0.12); color: #fda4af; border-color: rgba(251, 113, 133, 0.3); }
        .btn-deactivate:hover { background: var(--danger); color: #2a0407; }
        .btn-delete { background: transparent; color: var(--danger); border-color: rgba(251, 113, 133, 0.4); }
        .btn-delete:hover { background: var(--danger); color: #2a0407; }
        .btn-make-admin { background: rgba(129, 140, 248, 0.14); color: #a5b4fc; border-color: rgba(129, 140, 248, 0.35); }
        .btn-make-admin:hover { background: var(--admin-accent); color: #0d1030; }
        .btn-remove-admin { background: rgba(255,255,255,0.05); color: var(--text-mid); border-color: var(--glass-border); }
        .btn-remove-admin:hover { background: var(--text-dim); color: #0a0e1a; }

        .alert {
            padding: 10px 14px;
            border-radius: 7px;
            font-size: 0.88rem;
            margin-bottom: 14px;
            display: none;
            border: 1px solid transparent;
        }
        .alert.error { background: rgba(251, 113, 133, 0.1); color: #ffb4c0; border-color: rgba(251, 113, 133, 0.3); }
        .alert.success { background: rgba(52, 211, 153, 0.1); color: #86e6c2; border-color: rgba(52, 211, 153, 0.3); }
        .alert.show { display: block; }

        .loading { text-align: center; color: var(--text-dim); padding: 30px; font-style: italic; }

        .table-wrap { overflow-x: auto; }

        @media (prefers-reduced-motion: reduce) {
            .blob { animation: none !important; }
        }

        @media (max-width: 600px) {
            .admin-body { padding: 16px 10px; }
            .create-form { flex-direction: column; }
            .user-table th:nth-child(4), .user-table td:nth-child(4),
            .user-table th:nth-child(5), .user-table td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

<div class="blob-field">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<div class="admin-header">
    <h1><i class="fas fa-shield-alt"></i> PLC SimTel — Admin Panel</h1>
    <div class="admin-header-right">
        <a href="/index.html"><i class="fas fa-arrow-left"></i> Back to App</a>
        <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="admin-body" id="admin-body">

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">–</div><div class="stat-label">Total Users</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-active">–</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-pending">–</div><div class="stat-label">Pending Approval</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-admins">–</div><div class="stat-label">Admins</div></div>
    </div>

    <!-- Create User -->
    <div class="panel">
        <div class="panel-header">
            <h2><i class="fas fa-user-plus"></i> Create User</h2>
        </div>
        <div class="panel-body">
            <div class="alert error" id="create-error"></div>
            <div class="alert success" id="create-success"></div>
            <div class="create-form">
                <input type="text" id="c-name" placeholder="Full Name">
                <input type="email" id="c-email" placeholder="Email Address">
                <input type="password" id="c-password" placeholder="Password (min 6)">
                <select id="c-role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn-primary" onclick="createUser()">
                    <i class="fas fa-plus"></i> Create &amp; Activate
                </button>
            </div>
        </div>
    </div>

    <!-- User List -->
    <div class="panel">
        <div class="panel-header">
            <h2><i class="fas fa-users"></i> All Users</h2>
            <div class="search-bar">
                <i class="fas fa-search" style="color:var(--text-dim);"></i>
                <input type="text" id="user-search" placeholder="Filter users..." oninput="filterTable()">
            </div>
        </div>
        <div class="panel-body">
            <div class="alert error" id="list-error"></div>
            <div class="table-wrap">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Role</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-tbody">
                        <tr><td colspan="6" class="loading">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    const cfg = window.SIMTEL_AUTH_CONFIG;
    let allUsers = [];

    // Guard: only admin can access this page
    const userRaw = localStorage.getItem(cfg.USER_KEY);
    const currentUser = userRaw ? JSON.parse(userRaw) : null;
    if (!currentUser || currentUser.role !== 'admin') {
        alert('Admin access required.');
        window.location.replace(window.location.origin + cfg.LOGIN_PAGE);
    }

    if (window.gsap) {
        gsap.from('.admin-header', { opacity: 0, y: -12, duration: 0.5, ease: 'power2.out' });
        gsap.from('.stat-card', { opacity: 0, y: 16, stagger: 0.08, duration: 0.5, delay: 0.1, ease: 'power2.out' });
        gsap.from('.panel', { opacity: 0, y: 16, stagger: 0.1, duration: 0.5, delay: 0.25, ease: 'power2.out' });
    }

    function getToken() { return localStorage.getItem(cfg.TOKEN_KEY); }

    function authHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
    }

    function showMsg(id, msg, type) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.className = `alert ${type} show`;
        if (window.gsap) gsap.fromTo(el, { opacity: 0, y: -6 }, { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' });
        setTimeout(() => el.className = 'alert', 4000);
    }

    async function loadUsers() {
        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users`, { headers: authHeaders() });
            const data = await res.json();
            if (!data.success) throw new Error(data.message);
            allUsers = data.users;
            renderTable(allUsers);
            updateStats(allUsers);
        } catch (err) {
            document.getElementById('list-error').textContent = err.message;
            document.getElementById('list-error').className = 'alert error show';
        }
    }

    function updateStats(users) {
        document.getElementById('stat-total').textContent = users.length;
        document.getElementById('stat-active').textContent = users.filter(u => u.isActive).length;
        document.getElementById('stat-pending').textContent = users.filter(u => !u.isActive).length;
        document.getElementById('stat-admins').textContent = users.filter(u => u.role === 'admin').length;
        if (window.gsap) {
            gsap.from('.stat-num', { scale: 1.15, duration: 0.35, stagger: 0.05, ease: 'back.out(2)' });
        }
    }

    function filterTable() {
        const q = document.getElementById('user-search').value.toLowerCase();
        const filtered = allUsers.filter(u =>
            u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
        );
        renderTable(filtered);
    }

    function renderTable(users) {
        const tbody = document.getElementById('user-tbody');
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="loading">No users found.</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr id="row-${u._id}">
                <td><strong>${escHtml(u.name)}</strong></td>
                <td>${escHtml(u.email)}</td>
                <td>
                    <span class="badge ${u.isActive ? 'badge-active' : 'badge-inactive'}">
                        ${u.isActive ? 'Active' : 'Pending'}
                    </span>
                </td>
                <td>
                    <span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">
                        ${u.role}
                    </span>
                </td>
                <td>${new Date(u.createdAt).toLocaleDateString('en-IN')}</td>
                <td>
                    <div class="action-btns">
                        ${u.isActive
                            ? `<button class="btn-sm btn-deactivate" onclick="setActive('${u._id}', false)">Revoke</button>`
                            : `<button class="btn-sm btn-activate" onclick="setActive('${u._id}', true)">Approve</button>`
                        }
                        ${u.role === 'admin'
                            ? `<button class="btn-sm btn-remove-admin" onclick="setRole('${u._id}', 'user')">Remove Admin</button>`
                            : `<button class="btn-sm btn-make-admin" onclick="setRole('${u._id}', 'admin')">Make Admin</button>`
                        }
                        <button class="btn-sm btn-delete" onclick="deleteUser('${u._id}', '${escHtml(u.name)}')">Delete</button>
                    </div>
                </td>
            </tr>
        `).join('');

        if (window.gsap) {
            gsap.from('#user-tbody tr', { opacity: 0, y: 10, stagger: 0.04, duration: 0.35, ease: 'power2.out' });
        }
    }

    async function createUser() {
        const name = document.getElementById('c-name').value.trim();
        const email = document.getElementById('c-email').value.trim();
        const password = document.getElementById('c-password').value;
        const role = document.getElementById('c-role').value;

        if (!name || !email || !password) {
            showMsg('create-error', 'All fields are required.', 'error');
            return;
        }

        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users`, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ name, email, password, role })
            });
            const data = await res.json();
            if (data.success) {
                showMsg('create-success', data.message, 'success');
                document.getElementById('c-name').value = '';
                document.getElementById('c-email').value = '';
                document.getElementById('c-password').value = '';
                loadUsers();
            } else {
                showMsg('create-error', data.message, 'error');
            }
        } catch {
            showMsg('create-error', 'Server error. Try again.', 'error');
        }
    }

    async function setActive(id, active) {
        const action = active ? 'activate' : 'deactivate';
        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users/${id}/${action}`, {
                method: 'PUT', headers: authHeaders()
            });
            const data = await res.json();
            if (data.success) {
                allUsers = allUsers.map(u => u._id === id ? { ...u, isActive: active } : u);
                renderTable(allUsers);
                updateStats(allUsers);
            }
        } catch { alert('Error updating user.'); }
    }

    async function setRole(id, role) {
        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users/${id}/role`, {
                method: 'PUT',
                headers: authHeaders(),
                body: JSON.stringify({ role })
            });
            const data = await res.json();
            if (data.success) {
                allUsers = allUsers.map(u => u._id === id ? { ...u, role } : u);
                renderTable(allUsers);
                updateStats(allUsers);
            }
        } catch { alert('Error updating role.'); }
    }

    async function deleteUser(id, name) {
        if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users/${id}`, {
                method: 'DELETE', headers: authHeaders()
            });
            const data = await res.json();
            if (data.success) {
                allUsers = allUsers.filter(u => u._id !== id);
                renderTable(allUsers);
                updateStats(allUsers);
            }
        } catch { alert('Error deleting user.'); }
    }

    function logout() {
        localStorage.removeItem(cfg.TOKEN_KEY);
        localStorage.removeItem(cfg.USER_KEY);
        window.location.replace(window.location.origin + cfg.LOGIN_PAGE);
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadUsers();
</script>
</body>
</html>

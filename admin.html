<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – PLC SimTel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="./auth-config.js"></script>
    <script src="./auth-guard.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Brand palette — sampled from the Scientech flame mark */
            --flame-gold:    #ca9b40;
            --flame-orange:  #b73628;
            --flame-purple:  #806c9b;
            --flame-indigo:  #434575;
            --ink:           #221e1c;
            --brand-gradient: linear-gradient(135deg, var(--flame-gold) 0%, var(--flame-orange) 32%, var(--flame-purple) 68%, var(--flame-indigo) 100%);
            --border-color: #e3e1e8;
            --shadow: 0 10px 30px rgba(34, 30, 28, 0.08);
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background:
                radial-gradient(1000px 500px at 15% -10%, rgba(202, 155, 64, 0.06), transparent 55%),
                radial-gradient(900px 500px at 105% 10%, rgba(67, 69, 117, 0.06), transparent 55%),
                #f7f7f9;
            color: var(--ink);
            min-height: 100vh;
        }

        .admin-header {
            background: var(--brand-gradient);
            background-size: 220% 220%;
            animation: shimmer 10s ease-in-out infinite;
            color: #fff;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: 0 6px 24px rgba(34, 30, 28, 0.15);
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        .admin-header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-header a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.15s var(--ease);
        }

        .admin-header a:hover { color: #fff; }

        .admin-header button {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s var(--ease);
        }

        .admin-header button:hover { background: rgba(255,255,255,0.28); }

        .admin-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 20px;
            animation: fadeInUp 0.5s var(--ease) both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 12px;
            padding: 18px 22px;
            box-shadow: var(--shadow);
            flex: 1;
            min-width: 130px;
            text-align: center;
            transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(67, 69, 117, 0.16);
        }

        .stat-card .stat-num {
            font-size: 2rem;
            font-weight: 700;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .stat-label {
            font-size: 0.82rem;
            color: #6b5c86;
            margin-top: 2px;
        }

        /* Create User */
        .panel {
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 14px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .panel-header h2 {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-header h2 i { color: var(--flame-orange); }

        .panel-body { padding: 20px; }

        .create-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .create-form input, .create-form select {
            flex: 1;
            min-width: 140px;
            padding: 9px 11px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            color: var(--ink);
            background: #fff;
            transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
        }

        .create-form input:focus, .create-form select:focus {
            outline: none;
            border-color: var(--flame-purple);
            box-shadow: 0 0 0 3px rgba(128, 108, 155, 0.18);
        }

        .btn-primary {
            background: var(--brand-gradient);
            background-size: 200% 200%;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 9px 18px;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background-position 0.4s var(--ease), transform 0.15s var(--ease), box-shadow 0.2s var(--ease);
            box-shadow: 0 6px 16px rgba(183, 54, 40, 0.22);
        }

        .btn-primary:hover {
            background-position: 100% 100%;
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(67, 69, 117, 0.28);
        }

        /* Search */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-bar input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.88rem;
            font-family: inherit;
            width: 200px;
            transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--flame-purple);
            box-shadow: 0 0 0 3px rgba(128, 108, 155, 0.18);
        }

        /* Table */
        .table-wrap { overflow-x: auto; }

        .user-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        .user-table th {
            background: #efedf3;
            padding: 10px 14px;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #6b5c86;
            border-bottom: 1px solid var(--border-color);
        }

        .user-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #eeecf2;
            vertical-align: middle;
        }

        .user-table tr:last-child td { border-bottom: none; }

        .user-table tr:hover td { background: #f8f7fb; }

        .badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge-active { background: #e2f0e6; color: #1f5c34; }
        .badge-inactive { background: #fbe9e7; color: #8a2a1c; }
        .badge-admin { background: #e6e3f2; color: var(--flame-indigo); }
        .badge-user { background: #efedf3; color: #6b5c86; }

        .action-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 4px 11px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-family: inherit;
            cursor: pointer;
            border: 1px solid transparent;
            font-weight: 600;
            transition: all 0.15s var(--ease);
        }

        .btn-activate { background: #e2f0e6; color: #1f5c34; border-color: #b9dcc3; }
        .btn-activate:hover { background: #2e8b57; color: #fff; }
        .btn-deactivate { background: #fbe9e7; color: #8a2a1c; border-color: #f0c6bd; }
        .btn-deactivate:hover { background: var(--flame-orange); color: #fff; }
        .btn-delete { background: #fff; color: var(--flame-orange); border-color: var(--flame-orange); }
        .btn-delete:hover { background: var(--flame-orange); color: #fff; }
        .btn-make-admin { background: #e6e3f2; color: var(--flame-indigo); border-color: #cfc9e2; }
        .btn-make-admin:hover { background: var(--flame-indigo); color: #fff; }
        .btn-remove-admin { background: #efedf3; color: #6b5c86; border-color: #d9d5e3; }
        .btn-remove-admin:hover { background: #6b5c86; color: #fff; }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 14px;
            display: none;
            animation: alertIn 0.25s var(--ease) both;
        }
        @keyframes alertIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .alert.error { background: #fbe9e7; color: #8a2a1c; border: 1px solid #f0c6bd; }
        .alert.success { background: #eaf3ec; color: #1f5c34; border: 1px solid #bfe0c9; }
        .alert.show { display: block; }

        .loading { text-align: center; color: #6b5c86; padding: 30px; font-style: italic; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }

        @media (max-width: 600px) {
            .admin-body { padding: 16px 10px; }
            .create-form { flex-direction: column; }
            .user-table th:nth-child(4), .user-table td:nth-child(4),
            .user-table th:nth-child(5), .user-table td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

<div class="admin-header">
    <h1><i class="fas fa-shield-alt"></i> PLC SimTel — Admin Panel</h1>
    <div class="admin-header-right">
        <a href="/index.html"><i class="fas fa-arrow-left"></i> Back to App</a>
        <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="admin-body">

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">–</div><div class="stat-label">Total Users</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-active">–</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-pending">–</div><div class="stat-label">Pending Approval</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-admins">–</div><div class="stat-label">Admins</div></div>
    </div>

    <!-- Create User -->
    <div class="panel">
        <div class="panel-header">
            <h2><i class="fas fa-user-plus"></i> Create User</h2>
        </div>
        <div class="panel-body">
            <div class="alert error" id="create-error"></div>
            <div class="alert success" id="create-success"></div>
            <div class="create-form">
                <input type="text" id="c-name" placeholder="Full Name">
                <input type="email" id="c-email" placeholder="Email Address">
                <input type="password" id="c-password" placeholder="Password (min 6)">
                <select id="c-role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn-primary" onclick="createUser()">
                    <i class="fas fa-plus"></i> Create &amp; Activate
                </button>
            </div>
        </div>
    </div>

    <!-- User List -->
    <div class="panel">
        <div class="panel-header">
            <h2><i class="fas fa-users"></i> All Users</h2>
            <div class="search-bar">
                <i class="fas fa-search" style="color:#6b5c86;"></i>
                <input type="text" id="user-search" placeholder="Filter users..." oninput="filterTable()">
            </div>
        </div>
        <div class="panel-body">
            <div class="alert error" id="list-error"></div>
            <div class="table-wrap">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Role</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-tbody">
                        <tr><td colspan="6" class="loading">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    const cfg = window.SIMTEL_AUTH_CONFIG;
    let allUsers = [];

    // Guard: only admin can access this page
    const userRaw = localStorage.getItem(cfg.USER_KEY);
    const currentUser = userRaw ? JSON.parse(userRaw) : null;
    if (!currentUser || currentUser.role !== 'admin') {
        alert('Admin access required.');
        window.location.replace(window.location.origin + cfg.LOGIN_PAGE);
    }

    function getToken() { return localStorage.getItem(cfg.TOKEN_KEY); }

    function authHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
    }

    function showMsg(id, msg, type) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.className = `alert ${type} show`;
        setTimeout(() => el.className = 'alert', 4000);
    }

    async function loadUsers() {
        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users`, { headers: authHeaders() });
            const data = await res.json();
            if (!data.success) throw new Error(data.message);
            allUsers = data.users;
            renderTable(allUsers);
            updateStats(allUsers);
        } catch (err) {
            document.getElementById('list-error').textContent = err.message;
            document.getElementById('list-error').className = 'alert error show';
        }
    }

    function updateStats(users) {
        document.getElementById('stat-total').textContent = users.length;
        document.getElementById('stat-active').textContent = users.filter(u => u.isActive).length;
        document.getElementById('stat-pending').textContent = users.filter(u => !u.isActive).length;
        document.getElementById('stat-admins').textContent = users.filter(u => u.role === 'admin').length;
    }

    function filterTable() {
        const q = document.getElementById('user-search').value.toLowerCase();
        const filtered = allUsers.filter(u =>
            u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
        );
        renderTable(filtered);
    }

    function renderTable(users) {
        const tbody = document.getElementById('user-tbody');
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="loading">No users found.</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr id="row-${u._id}">
                <td><strong>${escHtml(u.name)}</strong></td>
                <td>${escHtml(u.email)}</td>
                <td>
                    <span class="badge ${u.isActive ? 'badge-active' : 'badge-inactive'}">
                        ${u.isActive ? 'Active' : 'Pending'}
                    </span>
                </td>
                <td>
                    <span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">
                        ${u.role}
                    </span>
                </td>
                <td>${new Date(u.createdAt).toLocaleDateString('en-IN')}</td>
                <td>
                    <div class="action-btns">
                        ${u.isActive
                            ? `<button class="btn-sm btn-deactivate" onclick="setActive('${u._id}', false)">Revoke</button>`
                            : `<button class="btn-sm btn-activate" onclick="setActive('${u._id}', true)">Approve</button>`
                        }
                        ${u.role === 'admin'
                            ? `<button class="btn-sm btn-remove-admin" onclick="setRole('${u._id}', 'user')">Remove Admin</button>`
                            : `<button class="btn-sm btn-make-admin" onclick="setRole('${u._id}', 'admin')">Make Admin</button>`
                        }
                        <button class="btn-sm btn-delete" onclick="deleteUser('${u._id}', '${escHtml(u.name)}')">Delete</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    async function createUser() {
        const name = document.getElementById('c-name').value.trim();
        const email = document.getElementById('c-email').value.trim();
        const password = document.getElementById('c-password').value;
        const role = document.getElementById('c-role').value;

        if (!name || !email || !password) {
            showMsg('create-error', 'All fields are required.', 'error');
            return;
        }

        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users`, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ name, email, password, role })
            });
            const data = await res.json();
            if (data.success) {
                showMsg('create-success', data.message, 'success');
                document.getElementById('c-name').value = '';
                document.getElementById('c-email').value = '';
                document.getElementById('c-password').value = '';
                loadUsers();
            } else {
                showMsg('create-error', data.message, 'error');
            }
        } catch {
            showMsg('create-error', 'Server error. Try again.', 'error');
        }
    }

    async function setActive(id, active) {
        const action = active ? 'activate' : 'deactivate';
        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users/${id}/${action}`, {
                method: 'PUT', headers: authHeaders()
            });
            const data = await res.json();
            if (data.success) {
                allUsers = allUsers.map(u => u._id === id ? { ...u, isActive: active } : u);
                renderTable(allUsers);
                updateStats(allUsers);
            }
        } catch { alert('Error updating user.'); }
    }

    async function setRole(id, role) {
        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users/${id}/role`, {
                method: 'PUT',
                headers: authHeaders(),
                body: JSON.stringify({ role })
            });
            const data = await res.json();
            if (data.success) {
                allUsers = allUsers.map(u => u._id === id ? { ...u, role } : u);
                renderTable(allUsers);
                updateStats(allUsers);
            }
        } catch { alert('Error updating role.'); }
    }

    async function deleteUser(id, name) {
        if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/admin/users/${id}`, {
                method: 'DELETE', headers: authHeaders()
            });
            const data = await res.json();
            if (data.success) {
                allUsers = allUsers.filter(u => u._id !== id);
                renderTable(allUsers);
                updateStats(allUsers);
            }
        } catch { alert('Error deleting user.'); }
    }

    function logout() {
        localStorage.removeItem(cfg.TOKEN_KEY);
        localStorage.removeItem(cfg.USER_KEY);
        window.location.replace(window.location.origin + cfg.LOGIN_PAGE);
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadUsers();
</script>
</body>
</html>

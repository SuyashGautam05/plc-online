<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – PLC SimTel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="./auth-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }

        .auth-card-header {
            /* background: #343a40; */
            background: #173681;
            color: #fff;
            padding: 12px 24px 12px;
            /* padding: 28px 32px 22px; */
            text-align: center;
        }

        .auth-card-header img {
            /* height: 48px; */
            height: 100px;
            /* margin-bottom: 10px; */
            /* margin-bottom: -19px; */
            margin-bottom: -12px;
                margin-top: -12px;
        }

        .auth-card-header h1 {
            /* font-size: 1.25rem; */
            font-size: 1.0rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .auth-card-header p {
            font-size: 0.85rem;
            color: #adb5bd;
            margin-top: 4px;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #e9ecef;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 0.9rem;
            cursor: pointer;
            color: #6c757d;
            background: none;
            border: none;
            font-family: inherit;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.15s;
        }

        .auth-tab.active {
            color: #343a40;
            border-bottom-color: #343a40;
            font-weight: 600;
        }

        .auth-body { padding: 28px 32px 32px; }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.83rem;
            color: #495057;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #343a40;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6c757d;
        }

        .btn {
            width: 100%;
            padding: 10px;
            /* background: #343a40; */
            background: #e1ac3d;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s;
        }

        .btn:hover { background: #23272b; }
        .btn:disabled { background: #adb5bd; cursor: not-allowed; }

        .alert {
            padding: 10px 14px;
            border-radius: 5px;
            font-size: 0.88rem;
            margin-bottom: 16px;
            display: none;
        }

        .alert.error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        .alert.success { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .alert.show { display: block; }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .college-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .college-chip {
            background: #f1f3f5;
            color: #495057;
            border: 1px solid #dee2e6;
            border-radius: 14px;
            padding: 4px 12px;
            font-size: 0.76rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .college-chip:hover {
            background: #343a40;
            color: #fff;
            border-color: #343a40;
        }

        .college-chip.selected {
            background: #343a40;
            color: #fff;
            border-color: #343a40;
        }

        .pending-note {
            font-size: 0.8rem;
            color: #6c757d;
            text-align: center;
            margin-top: 14px;
            line-height: 1.5;
        }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-card-header">
        <img src="./assets/Scientech logo-2.png" alt="Scientech" onerror="this.style.display='none'">
        <h1>PLC Simulation Software</h1>
        <!-- <p>Programmable Logic Controller Training</p> -->
    </div>

    <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <div class="auth-body">

        <!-- LOGIN FORM -->
        <div class="form-panel active" id="panel-login">
            <div class="alert error" id="login-error"></div>
            <div class="alert success" id="login-success"></div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn" id="login-btn" onclick="handleLogin()">Login</button>
        </div>

        <!-- REGISTER FORM -->
        <div class="form-panel" id="panel-register">
            <div class="alert error" id="reg-error"></div>
            <div class="alert success" id="reg-success"></div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Your name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min. 6 characters" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>College / Institute</label>
                <input type="text" id="reg-college" placeholder="Enter the Name of your College / Organization" list="college-suggestions" autocomplete="organization">
                <datalist style="display: none;" id="college-suggestions"></datalist>
                <div style="display: none;" class="college-chips" id="college-chips"></div>
            </div>
            <button class="btn" id="reg-btn" onclick="handleRegister()">Create Account</button>
            <p class="pending-note">
                <i class="fas fa-info-circle"></i>
                After registering, your account needs to be <strong>approved by an admin</strong> before you can log in.
            </p>
        </div>

    </div>
</div>

<script>
    const cfg = window.SIMTEL_AUTH_CONFIG;

    // Quick-pick chips for common colleges — clicking one fills the text
    // input, but the field stays free-text so any institute can be entered.
    const SUGGESTED_COLLEGES = [
        'LNCT Group of Colleges, Bhopal',
        'IET DAVV, Indore',
        'SGSITS, Indore',
        'MANIT Bhopal',
        'RGPV Bhopal',
        'Other'
    ];

    (function initCollegeChips() {
        const chipRow = document.getElementById('college-chips');
        const datalist = document.getElementById('college-suggestions');
        const input = document.getElementById('reg-college');

        SUGGESTED_COLLEGES.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            datalist.appendChild(opt);

            const chip = document.createElement('button');
            chip.type = 'button';
            chip.className = 'college-chip';
            chip.textContent = name;
            chip.addEventListener('click', () => {
                if (name === 'Other') {
                    input.value = '';
                    input.focus();
                } else {
                    input.value = name;
                }
                document.querySelectorAll('.college-chip').forEach(c => c.classList.remove('selected'));
                chip.classList.add('selected');
            });
            chipRow.appendChild(chip);
        });

        // Typing manually clears any "selected" chip highlight
        input.addEventListener('input', () => {
            document.querySelectorAll('.college-chip').forEach(c => c.classList.remove('selected'));
        });
    })();

    // If already logged in, redirect to main page
    const existingToken = localStorage.getItem(cfg.TOKEN_KEY);
    if (existingToken) {
        const redirectUrl = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
        window.location.replace(redirectUrl);
    }

    function switchTab(tab) {
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('panel-' + tab).classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    function showMsg(id, msg, type) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.className = `alert ${type} show`;
    }

    function hideMsg(id) {
        document.getElementById(id).className = 'alert';
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn = document.getElementById('login-btn');

        hideMsg('login-error');
        hideMsg('login-success');

        if (!email || !password) {
            showMsg('login-error', 'Please enter email and password.', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Logging in...';

        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem(cfg.TOKEN_KEY, data.token);
                localStorage.setItem(cfg.USER_KEY, JSON.stringify(data.user));
                showMsg('login-success', 'Login successful! Redirecting...', 'success');
                const redirectUrl = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
                setTimeout(() => window.location.replace(redirectUrl), 600);
            } else {
                showMsg('login-error', data.message || 'Login failed.', 'error');
            }
        } catch {
            showMsg('login-error', 'Cannot reach server. Please try again.', 'error');
        }

        btn.disabled = false;
        btn.textContent = 'Login';
    }

    async function handleRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const college = document.getElementById('reg-college').value.trim();
        const btn = document.getElementById('reg-btn');

        hideMsg('reg-error');
        hideMsg('reg-success');

        if (!name || !email || !password || !college) {
            showMsg('reg-error', 'All fields, including college, are required.', 'error');
            return;
        }
        if (college.length < 2) {
            showMsg('reg-error', 'Please enter a valid college/institute name.', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Creating account...';

        try {
            const res = await fetch(`${cfg.AUTH_SERVER_URL}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, college })
            });
            const data = await res.json();

            if (data.success) {
                showMsg('reg-success', data.message + ' Redirecting to verification...', 'success');
                const registeredEmail = email;
                document.getElementById('reg-name').value = '';
                document.getElementById('reg-email').value = '';
                document.getElementById('reg-password').value = '';
                document.getElementById('reg-college').value = '';
                document.querySelectorAll('.college-chip').forEach(c => c.classList.remove('selected'));
                setTimeout(() => {
                    window.location.href = 'verify-otp.html?email=' + encodeURIComponent(registeredEmail);
                }, 1200);
            } else {
                showMsg('reg-error', data.message || 'Registration failed.', 'error');
            }
        } catch {
            showMsg('reg-error', 'Cannot reach server. Please try again.', 'error');
        }

        btn.disabled = false;
        btn.textContent = 'Create Account';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const loginPanel = document.getElementById('panel-login');
            const regPanel = document.getElementById('panel-register');
            if (loginPanel.classList.contains('active')) handleLogin();
            else if (regPanel.classList.contains('active')) handleRegister();
        }
    });
</script>
</body>
</html>
